<!DOCTYPE html>

<head><title>Seed Firestore Data</title></head>

<h2>Seeding Firestore...</h2>
<pre id="log"></pre>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const log = document.getElementById("log");

const firebaseConfig = {
  apiKey: "AIzaSyDIU8EchMuxZrSNMYZA4UN6caiG-922rpY",
  authDomain: "guess-the-object-2f17e.firebaseapp.com",
  projectId: "guess-the-object-2f17e",
  storageBucket: "guess-the-object-2f17e.firebasestorage.app",
  messagingSenderId: "267529989039",
  appId: "1:267529989039:web:34840e655aaf7f25559d5a"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

await signInAnonymously(auth);
log.textContent += "✓ Authenticated anonymously\n";

const categories = {
  animals: { name: "Animals", description: "From pets to wild beasts", iconUrl: "", order: 1 },

  vehicles: { name: "Vehicles", description: "Things that move", iconUrl: "", order: 5 },
  home: { name: "Home Items", description: "Everything at home", iconUrl: "", order: 6 },
};

for (const [id, data] of Object.entries(categories)) {
  await setDoc(doc(db, "categories", id), data);
  log.textContent += `✓ Category: ${data.name}\n`;
}

const objects = {
  elephant: { name: "Elephant", categoryId: "animals" },
  dog: { name: "Dog", categoryId: "animals" },
  cat: { name: "Cat", categoryId: "animals" },
  eagle: { name: "Eagle", categoryId: "animals" },
  shark: { name: "Shark", categoryId: "animals" },

  laptop: { name: "Laptop", categoryId: "technology" },
  headphones: { name: "Headphones", categoryId: "technology" },
  camera: { name: "Camera", categoryId: "technology" },
  drone: { name: "Drone", categoryId: "technology" },
  smartwatch: { name: "Smartwatch", categoryId: "technology" },
  tablet: { name: "Tablet", categoryId: "technology" },
