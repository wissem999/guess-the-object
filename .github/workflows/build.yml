name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Cache signing keystore
        uses: actions/cache@v4
        with:
          path: keystore
          key: release-keystore-v1

      - name: Generate signing keystore if missing
        run: |
          if [ ! -f keystore/release.jks ]; then
            mkdir -p keystore
            keytool -genkeypair -v \
              -keystore keystore/release.jks \
              -alias guess_the_object \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -storepass guessobject123 \
              -keypass guessobject123 \
              -dname "CN=Wissem, OU=Dev, O=GuessTheObject, L=Tunis, ST=Tunis, C=TN"
          fi

      - name: Print SHA-1 fingerprint
        id: print_sha
        run: |
          SHA1=$(keytool -list -v -keystore keystore/release.jks -alias guess_the_object -storepass guessobject123 2>&1 | grep "SHA1:" | sed 's/.*SHA1: //')
          SHA256=$(keytool -list -v -keystore keystore/release.jks -alias guess_the_object -storepass guessobject123 2>&1 | grep "SHA256:" | sed 's/.*SHA256: //')
          echo "SHA-1: $SHA1"
          echo "SHA-256: $SHA256"
          echo "SHA1=$SHA1" >> "$GITHUB_OUTPUT"
          echo "SHA256=$SHA256" >> "$GITHUB_OUTPUT"

      - name: Create .env file
        run: |
          cat > .env << EOF
          FIREBASE_API_KEY=${{ secrets.FIREBASE_API_KEY }}
          FIREBASE_AUTH_DOMAIN=${{ secrets.FIREBASE_AUTH_DOMAIN }}
          FIREBASE_PROJECT_ID=${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_STORAGE_BUCKET=${{ secrets.FIREBASE_STORAGE_BUCKET }}
          FIREBASE_MESSAGING_SENDER_ID=${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
          FIREBASE_APP_ID=${{ secrets.FIREBASE_APP_ID }}
          FIREBASE_DATABASE_URL=${{ secrets.FIREBASE_DATABASE_URL }}
          GOOGLE_WEB_CLIENT_ID=${{ secrets.GOOGLE_WEB_CLIENT_ID }}
          EOF

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: guess-the-object-apk
          path: build/app/outputs/flutter-apk/app-release.apk

      # ── Auto-release + update.json ──────────────────────────
      - name: Get version from pubspec
        id: version
        run: |
          VERSION=$(grep 'version:' pubspec.yaml | head -1 | awk '{print $2}' | cut -d'+' -f1)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Check if release exists
        id: check_release
        run: |
          if gh release view "v${{ steps.version.outputs.version }}" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        if: steps.check_release.outputs.exists == 'false'
        run: |
          gh release create "v${{ steps.version.outputs.version }}" \
            build/app/outputs/flutter-apk/app-release.apk \
            --repo "${{ github.repository }}" \
            --title "v${{ steps.version.outputs.version }}" \
            --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update update.json
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          SHA1="${{ steps.print_sha.outputs.SHA1 }}"
          SHA256="${{ steps.print_sha.outputs.SHA256 }}"
          cat > update.json << EOF
          {
            "version": "${VERSION}",
            "apk_url": "https://github.com/${{ github.repository }}/releases/download/v${VERSION}/app-release.apk",
            "update_message": "Bug fixes and improvements",
            "sha1": "${SHA1}",
            "sha256": "${SHA256}"
          }
          EOF
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add update.json
          git diff --cached --quiet || git commit -m "chore: update update.json to v${VERSION} [skip ci]"
          git push
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
